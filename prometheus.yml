global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: recorder-master
    metrics_path: /metrics
    static_configs:
      - targets:
          - master:8090

  - job_name: recorder-agents
    metrics_path: /metrics
    static_configs:
      - targets:
          - agent-1:8082
          - agent-2:8083
