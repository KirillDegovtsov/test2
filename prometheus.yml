global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: recorder-master
    metrics_path: /metrics
    static_configs:
      - targets:
          - master:8090

  - job_name: recorder-agents
    metrics_path: /metrics
    static_configs:
      - targets:
          - agent-1:8082
          - agent-2:8083
          - agent-3:8084
          - agent-4:8085
          - agent-5:8086
          - agent-6:8087
          - agent-7:8088
          - agent-8:8089
          - agent-9:8091
          - agent-10:8092
